<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DDD Smart Trainer</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

.header{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:22px;
}

.container{
    padding:20px;
}

.card{
    background:#161616;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:6px;
    background:#7b2ff7;
    color:white;
    cursor:pointer;
}

.progress{
    height:10px;
    background:#333;
    border-radius:5px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:#0d6efd;
}
</style>
</head>

<body>

<div class="header">📘 DDD Smart Trainer</div>

<div class="container">

<div class="card">
<h3>Onboarding</h3>
<p id="lesson">Click start to begin training</p>
<button onclick="startTraining()">Start</button>
</div>

<div class="card">
<h3>Quiz</h3>
<p id="question">No question loaded</p>
<input id="answer" placeholder="Your answer">
<br><br>
<button onclick="checkAnswer()">Submit</button>
</div>

<div class="card">
<h3>Progress</h3>
<div class="progress"><div class="bar" id="bar"></div></div>
</div>

</div>

<script>
let lessons = [
"Welcome to DDD platform",
"Always label accurately",
"Follow occlusion rules",
"Review before submit"
];

let questions = [
{q:"What is occlusion?", a:"blocking"},
{q:"Should you guess labels?", a:"no"},
{q:"Review before submit?", a:"yes"}
];

let step = 0;
let score = 0;

function startTraining(){
    document.getElementById("lesson").innerText = lessons[step];
}

function checkAnswer(){
    let user = document.getElementById("answer").value.toLowerCase();
    let correct = questions[step].a;

    if(user.includes(correct)){
        score++;
        alert("Correct ✅");
    }else{
        alert("Wrong ❌");
    }

    step++;

    if(step < lessons.length){
        document.getElementById("lesson").innerText = lessons[step];
        document.getElementById("question").innerText = questions[step].q;
    }else{
        alert("Training Complete 🎉 Score: "+score);
    }

    document.getElementById("bar").style.width = (step/lessons.length*100)+"%";
}
</script>

</body>
</html>
