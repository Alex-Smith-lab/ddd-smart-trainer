<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DDD Training PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
overflow:hidden;
}

/* LANDING */
#landing{
position:absolute;
width:100%;
height:100vh;
background:linear-gradient(#001f3f,#007bff);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
animation:rise 1.5s ease;
}

@keyframes rise{
from{transform:translateY(100%);}
to{transform:translateY(0);}
}

button{
padding:12px 20px;
border:none;
border-radius:6px;
background:#fff;
color:#007bff;
cursor:pointer;
margin-top:20px;
}

/* LOGIN */
.page{
display:none;
padding:30px;
}

.active{
display:block;
}

.card{
background:#161616;
padding:20px;
border-radius:10px;
max-width:600px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

/* QUIZ */
.progress{
height:10px;
background:#333;
margin-top:10px;
}
.bar{
height:100%;
width:0%;
background:#0d6efd;
}

img{
max-width:100%;
margin-top:10px;
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
<h1>Welcome to DDD TRAINING SESSIONS</h1>
<button onclick="showPage('login')">Proceed</button>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<div class="card">
<h3>Request Access</h3>
<input id="name" placeholder="Enter your name">
<button onclick="requestAccess()">Request Access</button>
<p id="status"></p>
</div>
</div>

<!-- CATEGORY -->
<div id="home" class="page">
<div class="card">
<h3>Select Training</h3>
<button onclick="start('2D')">2D</button>
<button onclick="start('3D')">3D</button>
<button onclick="start('Cuboid')">Cuboid</button>
<button onclick="start('Polylane')">Polylanes</button>
<button onclick="start('Calibration')">Calibration</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="page">
<div class="card">
<h3 id="title"></h3>
<p id="question"></p>
<img id="qimg" style="display:none">
<input id="answer">
<button onclick="submit()">Submit</button>

<p id="timer"></p>
<div class="progress"><div class="bar" id="bar"></div></div>
<p id="msg"></p>
</div>
</div>

<!-- RESULT -->
<div id="result" class="page">
<div class="card">
<h3 id="final"></h3>
<button onclick="showPage('home')">Back</button>
</div>
</div>

<audio id="correctSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="wrongSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>

/* STATE */
let user="";
let approved=false;
let questions=[];
let current=0;
let score=0;
let wrong=0;
let timer=0;
let interval;
let category="";

/* PAGE NAV */
function showPage(id){
document.getElementById("landing").style.display="none";
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ACCESS SYSTEM */
function requestAccess(){
user=document.getElementById("name").value;

let users=JSON.parse(localStorage.getItem("users")||"[]");

users.push({name:user,approved:false});
localStorage.setItem("users",JSON.stringify(users));

document.getElementById("status").innerText="Waiting for admin approval...";
}

/* CHECK APPROVAL */
setInterval(()=>{
let users=JSON.parse(localStorage.getItem("users")||"[]");
let found=users.find(u=>u.name===user && u.approved);

if(found){
approved=true;
showPage("home");
}
},2000);

/* AI QUESTION GENERATOR */
function generate(type){

let base=[
{q:"What is occlusion?",a:"blocking"},
{q:"Should box be tight?",a:"yes"},
{q:"Label empty?",a:"no"},
{q:"3D uses?",a:"lidar"},
{q:"Cuboid shape?",a:"3d"},
{q:"Lane lines?",a:"road"},
{q:"Calibration aligns?",a:"camera"}
];

let out=[];

while(out.length<20){
let r=base[Math.floor(Math.random()*base.length)];
if(!out.includes(r)) out.push(r);
}

return out;
}

/* START */
function start(type){
category=type;
questions=generate(type);
current=0;
score=0;
wrong=0;
timer=0;

showPage("quiz");
next();

interval=setInterval(()=>{
timer++;
document.getElementById("timer").innerText="Time: "+timer+"s";
},1000);
}

/* NEXT */
function next(){
let q=questions[current];
document.getElementById("title").innerText=category+" "+(current+1)+"/20";
document.getElementById("question").innerText=q.q;

if(current%5==0){
document.getElementById("qimg").src="https://via.placeholder.com/400x200";
document.getElementById("qimg").style.display="block";
}else{
document.getElementById("qimg").style.display="none";
}

updateBar();
}

/* SUBMIT */
function submit(){
let ans=document.getElementById("answer").value.toLowerCase();
let correct=questions[current].a;

if(ans.includes(correct)){
score++;
document.getElementById("correctSound").play();
}else{
wrong++;
document.getElementById("wrongSound").play();

if(wrong>=3){
alert("Failed! Restarting");
location.reload();
}
}

current++;

if(current<20){
next();
}else{
finish();
}
}

/* FINISH */
function finish(){
clearInterval(interval);

let speedScore=Math.max(0,100-timer);
let finalScore=score*5 + speedScore;

document.getElementById("final").innerText=
"Score: "+score+"/20 | Speed Bonus: "+speedScore+" | Total: "+finalScore;

saveResult(finalScore);

showPage("result");
}

/* SAVE */
function saveResult(total){
let data=JSON.parse(localStorage.getItem("results")||"[]");

data.push({
name:user,
category:category,
score:total,
time:timer
});

localStorage.setItem("results",JSON.stringify(data));
}

/* BAR */
function updateBar(){
document.getElementById("bar").style.width=(current/20*100)+"%";
}

</script>

</body>
</html>
